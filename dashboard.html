<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Energia Domestica</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; font-size: 13px;
       background: #f0f2f5; color: #222; }
h1 { font-size: 1.3rem; }

/* ── Header / Filtri ── */
#header { background: #1a3a5c; color: #fff; padding: 12px 20px; }
#header h1 { margin-bottom: 8px; }
#filters { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
#filters label { font-size: 12px; }
#filters select { padding: 4px 8px; border-radius: 4px; border: none;
                   font-size: 13px; background: #fff; cursor: pointer; }
#btn-update { padding: 6px 16px; background: #e8a020; color: #fff;
               border: none; border-radius: 4px; cursor: pointer;
               font-weight: bold; font-size: 13px; }
#btn-update:hover { background: #c98010; }

/* ── Info bar ── */
#infobar { background: #eaf0fb; border-bottom: 1px solid #c5d3e8;
            padding: 6px 20px; font-size: 12px; color: #1a3a5c; }

/* ── Main content ── */
#content { padding: 12px 16px; }

/* ── Sezione (card) ── */
.section { background: #fff; border-radius: 6px; margin-bottom: 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,.1); overflow: hidden; }
.section-header { background: #1a3a5c; color: #fff; padding: 8px 14px;
                   display: flex; justify-content: space-between;
                   align-items: center; cursor: pointer; user-select: none; }
.section-header h2 { font-size: 0.9rem; font-weight: 600; }
.toggle-btn { font-size: 1rem; transition: transform .2s; }
.section-body { overflow-x: auto; }
.section-body.collapsed { display: none; }

/* ── Tabella KPI ── */
table { width: 100%; border-collapse: collapse; min-width: 400px; }
thead th { background: #2c5282; color: #fff; padding: 6px 8px;
            text-align: center; font-weight: 600; font-size: 12px;
            white-space: nowrap; }
thead th.kpi-col { text-align: left; min-width: 180px; position: sticky;
                    left: 0; z-index: 2; background: #2c5282; }
tbody tr:nth-child(even) { background: #f7f9fc; }
tbody tr:hover { background: #eef2fb; }
td { padding: 5px 8px; text-align: center; font-size: 12px;
      white-space: nowrap; border-bottom: 1px solid #e2e8f0; }
td.kpi-col { text-align: left; font-weight: 600; color: #1a3a5c;
              background: #f0f4fa; position: sticky; left: 0; z-index: 1;
              border-right: 2px solid #c5d3e8; min-width: 180px; }
td.unit-col { color: #888; font-size: 11px; }
td.total-col { background: #fff8e1; font-weight: 600; border-left: 2px solid #e8a020; }
.delta-green { color: #22c55e; font-size: 11px; font-weight: bold; }
.delta-red   { color: #dc2626; font-size: 11px; font-weight: bold; }
.delta-blue  { color: #3b82f6; font-size: 11px; font-weight: bold; }

/* ── Responsive ── */
@media (max-width: 600px) {
  body { font-size: 12px; }
  td, thead th { padding: 4px 5px; }
}
</style>
</head>
<body>

<div id="header">
  <h1>Dashboard Energia Domestica</h1>
  <div id="filters">
    <div>
      <label>Periodo&nbsp;
        <select id="sel-period"></select>
      </label>
    </div>
    <div>
      <label>Riferimento&nbsp;
        <select id="sel-ref"></select>
      </label>
    </div>
    <div>
      <label>Modalità&nbsp;
        <select id="sel-mode">
          <option value="TUTTE">Tutte</option>
          <option value="ESTATE">Estate</option>
          <option value="INVERNO">Inverno</option>
          <option value="MEZZE_STAGIONI">Mezze Stagioni</option>
        </select>
      </label>
    </div>
    <button id="btn-update">Aggiorna Dashboard</button>
  </div>
</div>

<div id="infobar">Seleziona i filtri e premi "Aggiorna Dashboard".</div>

<div id="content">
  <div class="section" id="sec-pv">
    <div class="section-header" onclick="toggleSection('sec-pv')">
      <h2>Fotovoltaico</h2>
      <span class="toggle-btn" id="toggle-sec-pv">&#9660;</span>
    </div>
    <div class="section-body" id="body-sec-pv">
      <table id="tbl-pv"><tbody><tr><td style="padding:12px;color:#888">Premi "Aggiorna Dashboard"</td></tr></tbody></table>
    </div>
  </div>

  <div class="section" id="sec-cons">
    <div class="section-header" onclick="toggleSection('sec-cons')">
      <h2>Dettaglio Consumi</h2>
      <span class="toggle-btn" id="toggle-sec-cons">&#9660;</span>
    </div>
    <div class="section-body" id="body-sec-cons">
      <table id="tbl-cons"><tbody><tr><td style="padding:12px;color:#888">Premi "Aggiorna Dashboard"</td></tr></tbody></table>
    </div>
  </div>

  <div class="section" id="sec-meteo">
    <div class="section-header" onclick="toggleSection('sec-meteo')">
      <h2>Meteo e Ambiente</h2>
      <span class="toggle-btn" id="toggle-sec-meteo">&#9660;</span>
    </div>
    <div class="section-body" id="body-sec-meteo">
      <table id="tbl-meteo"><tbody><tr><td style="padding:12px;color:#888">Premi "Aggiorna Dashboard"</td></tr></tbody></table>
    </div>
  </div>

  <div class="section" id="sec-pdc">
    <div class="section-header" onclick="toggleSection('sec-pdc')">
      <h2>Dettagli PDC</h2>
      <span class="toggle-btn" id="toggle-sec-pdc">&#9660;</span>
    </div>
    <div class="section-body" id="body-sec-pdc">
      <table id="tbl-pdc"><tbody><tr><td style="padding:12px;color:#888">Premi "Aggiorna Dashboard"</td></tr></tbody></table>
    </div>
  </div>

  <div class="section" id="sec-costi">
    <div class="section-header" onclick="toggleSection('sec-costi')">
      <h2>Costi</h2>
      <span class="toggle-btn" id="toggle-sec-costi">&#9660;</span>
    </div>
    <div class="section-body" id="body-sec-costi">
      <table id="tbl-costi"><tbody><tr><td style="padding:12px;color:#888">Premi "Aggiorna Dashboard"</td></tr></tbody></table>
    </div>
  </div>
</div>

const ANNI = [2023, 2024, 2025, 2026];

function initDropdowns() {
  const selP = document.getElementById("sel-period");
  const selR = document.getElementById("sel-ref");

  // Periodo: anni desc + "Tutti"
  ANNI.slice().reverse().forEach(a => {
    const opt = document.createElement("option");
    opt.value = String(a); opt.text = String(a);
    selP.appendChild(opt);
  });
  const optAll = document.createElement("option");
  optAll.value = "TUTTI"; optAll.text = "Tutti gli anni";
  selP.appendChild(optAll);

  // Riferimento: anni desc + "Media Storico"
  ANNI.slice().reverse().forEach(a => {
    const opt = document.createElement("option");
    opt.value = String(a); opt.text = String(a);
    selR.appendChild(opt);
  });
  const optMedia = document.createElement("option");
  optMedia.value = "MEDIA"; optMedia.text = "Media Storico";
  selR.appendChild(optMedia);

  // Default: ultimo anno come periodo, penultimo come riferimento
  if (ANNI.length >= 2) {
    selP.value = String(ANNI[ANNI.length - 1]);
    selR.value = String(ANNI[ANNI.length - 2]);
  } else if (ANNI.length === 1) {
    selP.value = String(ANNI[0]);
    selR.value = "MEDIA";
  }
}

function toggleSection(id) {
  const body   = document.getElementById("body-" + id);
  const toggle = document.getElementById("toggle-" + id);
  if (body.classList.contains("collapsed")) {
    body.classList.remove("collapsed");
    toggle.innerHTML = "&#9660;";
  } else {
    body.classList.add("collapsed");
    toggle.innerHTML = "&#9650;";
  }
}

// LOGICA FILTRO & AGGREGAZIONE
// ════════════════════════════════════════════════════════════════════════════

/** Filtra DATA per modalità. */
function filterByMode(rows, mode) {
  if (mode === "TUTTE") return rows;
  return rows.filter(r => r.Modalita_est_inv === mode);
}

/** Filtra DATA per anno (intero o "TUTTI"). */
function filterByYear(rows, anno) {
  if (anno === "TUTTI") return rows;
  const a = parseInt(anno, 10);
  return rows.filter(r => r.Anno === a);
}

/**
 * Aggrega rows per mese.
 * Restituisce Map&lt;mese(1-12), { col: somma|media, ... }&gt;
 * Per "sum": accumula somma + conteggio non-null
 * Per "avg": accumula somma + conteggio non-null
 * Entrambi i campi numerici vengono sommati; avg li divide dopo.
 */
function aggregateByMonth(rows) {
  // Identifica tutte le colonne numeriche
  const numCols = Object.keys(rows[0] || {}).filter(k =>
    !["Data_giorno","Modalita_est_inv","Anno","Mese"].includes(k)
  );

  const acc  = new Map(); // mese -> { col: sum, __cnt_col: n }
  const cntM = new Map(); // mese -> n righe totali

  for (const row of rows) {
    const m = row.Mese;
    if (!acc.has(m)) {
      const obj = {};
      numCols.forEach(c => { obj[c] = 0; obj["__cnt_" + c] = 0; });
      obj.__rows = 0;
      acc.set(m, obj);
    }
    const a = acc.get(m);
    a.__rows++;
    for (const col of numCols) {
      const v = row[col];
      if (v !== null && v !== undefined && !isNaN(v)) {
        a[col]          += v;
        a["__cnt_" + col]++;
      }
    }
  }
  return { acc, numCols };
}

/**
 * Calcola valore aggregato di un KPI per un mese.
 * @param agg_data  - risultato di aggregateByMonth (acc)
 * @param mese      - numero mese
 * @param kpi       - oggetto KPI_CONFIG
 * @returns numero o null
 */
function kpiValue(agg_data, mese, kpi) {
  if (!agg_data.acc.has(mese)) return null;
  const a = agg_data.acc.get(mese);

  if (kpi.agg === "sum") {
    const cnt = a["__cnt_" + kpi.col];
    if (cnt === 0) return null;
    return a[kpi.col];
  }
  if (kpi.agg === "avg") {
    const cnt = a["__cnt_" + kpi.col];
    if (cnt === 0) return null;
    return a[kpi.col] / cnt;
  }
  if (kpi.agg === "calc_agg") {
    // Costruisci un oggetto con le somme per ogni colonna
    const sums = {};
    agg_data.numCols.forEach(c => {
      const cnt = a["__cnt_" + c];
      sums[c] = cnt > 0 ? a[c] : null;
    });
    return kpi.calc(sums);
  }
  return null;
}

/**
 * Calcola valore aggregato su un insieme di mesi (per totale).
 * @param agg_data  - risultato aggregateByMonth
 * @param mesi      - array di numeri mese
 * @param kpi       - oggetto KPI_CONFIG
 */
function kpiTotal(agg_data, mesi, kpi) {
  if (mesi.length === 0) return null;

  if (kpi.agg === "sum") {
    let tot = 0, found = false;
    for (const m of mesi) {
      const v = kpiValue(agg_data, m, kpi);
      if (v !== null) { tot += v; found = true; }
    }
    return found ? tot : null;
  }

  if (kpi.agg === "avg") {
    let sum = 0, n = 0;
    for (const m of mesi) {
      const v = kpiValue(agg_data, m, kpi);
      if (v !== null) { sum += v; n++; }
    }
    return n > 0 ? sum / n : null;
  }

  if (kpi.agg === "calc_agg") {
    // Somma i numeratori e denominatori sugli accumulatori dei mesi comuni
    const numCols = agg_data.numCols;
    const mergedSums = {};
    numCols.forEach(c => { mergedSums[c] = null; });

    for (const m of mesi) {
      if (!agg_data.acc.has(m)) continue;
      const a = agg_data.acc.get(m);
      numCols.forEach(c => {
        const cnt = a["__cnt_" + c];
        if (cnt > 0) {
          mergedSums[c] = (mergedSums[c] || 0) + a[c];
        }
      });
    }
    return kpi.calc(mergedSums);
  }
  return null;
}

/**
 * Calcola la media storico per un anno di riferimento "MEDIA".
 * Consideriamo "valido" ogni anno con almeno 1 mese di dati Shelly.
 * Ritorna agg_data finto con valori medi per mese.
 */
function buildMediaStorico(rows, periodoAnno, mode) {
  // anni con almeno 6 mesi di dati
  const countByAnno = {};
  for (const r of rows) {
    if (!countByAnno[r.Anno]) countByAnno[r.Anno] = new Set();
    if (r.S_Energia_kWh !== null) countByAnno[r.Anno].add(r.Mese);
  }
  const anniValidi = Object.entries(countByAnno)
    .filter(([a, mesi]) => parseInt(a) !== parseInt(periodoAnno) && mesi.size >= 1)
    .map(([a]) => parseInt(a));

  if (anniValidi.length === 0) return null;

  const rowsValidi = rows.filter(r => anniValidi.includes(r.Anno));

  // Per ogni mese: calcola la media dei valori annui (avg per anno, poi avg degli anni)
  // Approccio semplificato: raggruppa per (anno, mese) e poi media per mese
  const byAnnoMese = {};
  for (const r of rowsValidi) {
    const k = r.Anno + "_" + r.Mese;
    if (!byAnnoMese[k]) byAnnoMese[k] = [];
    byAnnoMese[k].push(r);
  }

  // Aggrega ogni (anno,mese) → poi media per mese
  const numCols = Object.keys(rows[0] || {}).filter(k =>
    !["Data_giorno","Modalita_est_inv","Anno","Mese"].includes(k)
  );

  // acc: mese -> somma dei valori aggregati per anno, conteggio anni validi per quel mese
  const acc = new Map();
  const anniPerMese = new Map();

  for (const key of Object.keys(byAnnoMese)) {
    const [annoStr, meseStr] = key.split("_");
    const mese = parseInt(meseStr);
    const rowsBlock = byAnnoMese[key];

    // Aggrega questo blocco (anno, mese)
    const tempAcc = new Map();
    tempAcc.set(mese, {});
    const a = tempAcc.get(mese);
    numCols.forEach(c => { a[c] = 0; a["__cnt_" + c] = 0; });
    a.__rows = 0;
    for (const row of rowsBlock) {
      a.__rows++;
      for (const col of numCols) {
        const v = row[col];
        if (v !== null && v !== undefined && !isNaN(v)) {
          a[col] += v;
          a["__cnt_" + col]++;
        }
      }
    }

    if (!acc.has(mese)) {
      const obj = {};
      numCols.forEach(c => { obj[c] = 0; obj["__cnt_" + c] = 0; obj["__ann_" + c] = 0; });
      acc.set(mese, obj);
      anniPerMese.set(mese, 0);
    }
    const dest = acc.get(mese);
    anniPerMese.set(mese, anniPerMese.get(mese) + 1);

    for (const col of numCols) {
      const cnt = a["__cnt_" + col];
      if (cnt > 0) {
        // Valore aggregato per questo (anno,mese): sum oppure avg?
        // Usiamo la somma grezza (poi divideremo per n anni)
        dest[col] += a[col];
        dest["__cnt_" + col] += cnt;
        dest["__ann_" + col]++;
      }
    }
  }

  // Normalizza: per "sum" KPI → valore medio (somma/n_anni); per "avg" → già dividiamo nel kpiValue
  // Strategia: manteniamo acc come somma e __cnt come conteggio righe totali
  // kpiValue userà a[col] e __cnt_col normalmente
  return { acc, numCols };
}

// ════════════════════════════════════════════════════════════════════════════
// CUTOFF GIORNALIERO
// ════════════════════════════════════════════════════════════════════════════

/** Restituisce la data massima ("YYYY-MM-DD") presente nelle righe, o null. */
function getMaxDate(rows) {
  let maxDate = null;
  for (const r of rows) {
    if (r.Data_giorno && (maxDate === null || r.Data_giorno > maxDate)) {
      maxDate = r.Data_giorno;
    }
  }
  return maxDate;
}

/**
 * Filtra rows tenendo solo quelle con mese/giorno <= cutoffDate (l'anno viene ignorato).
 * cutoffDate: "YYYY-MM-DD" oppure null → nessun filtro.
 */
function applyDayCutoff(rows, cutoffDate) {
  if (!cutoffDate) return rows;
  const parts = cutoffDate.split("-").map(Number);
  const cutMM = parts[1], cutDD = parts[2];
  return rows.filter(r => {
    if (!r.Data_giorno) return true;
    const p = r.Data_giorno.split("-").map(Number);
    const mm = p[1], dd = p[2];
    return mm < cutMM || (mm === cutMM && dd <= cutDD);
  });
}

// ════════════════════════════════════════════════════════════════════════════
// RENDER TABELLA
// ════════════════════════════════════════════════════════════════════════════

function formatVal(val, dec) {
  if (val === null || val === undefined || isNaN(val)) return "-";
  const fixed = val.toFixed(dec);
  const parts = fixed.split(".");
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ".");
  return dec > 0 ? parts[0] + "," + parts[1] : parts[0];
}

function getDeltaClass(diff, dir, isAbsUnit) {
  if (diff === null || diff === undefined || isNaN(diff)) return "";
  const threshold = isAbsUnit ? 0.05 : 0;
  if (Math.abs(diff) <= threshold) return "";
  if (dir === "up")   return diff > 0 ? "delta-green" : "delta-red";
  if (dir === "down") return diff > 0 ? "delta-red"   : "delta-green";
  if (dir === "temp") return diff > 0 ? "delta-red"   : "delta-blue";
  return diff > 0 ? "delta-green" : "delta-red";
}

function formatDelta(vP, vR, kpi) {
  if (vP === null || vP === undefined || isNaN(vP)) return "";
  if (vR === null || vR === undefined || isNaN(vR)) return "";
  const diff = vP - vR;
  const isAbsUnit = kpi.unit === "°C" || kpi.unit === "%";
  let displayStr;
  if (isAbsUnit) {
    const sign = diff > 0 ? "+" : "";
    const dec = Math.abs(diff) >= 10 ? 0 : 1;
    displayStr = `${sign}${diff.toFixed(dec)}${kpi.unit}`;
  } else {
    if (vR === 0) return "";
    const pct = (diff / Math.abs(vR)) * 100;
    if (Math.abs(pct) < 0.1) return "";
    const sign = pct > 0 ? "+" : "";
    const dec = Math.abs(pct) >= 10 ? 0 : 1;
    displayStr = `${sign}${pct.toFixed(dec)}%`;
  }
  const cls = getDeltaClass(diff, kpi.dir, isAbsUnit);
  if (!cls) return "";
  return ` <span class="${cls}">${displayStr}</span>`;
}

function renderTable(tableId, kpis, aggPeriodo, aggRif, mesiPeriodo, mesiRif) {
  const mesiComuni = mesiPeriodo.filter(m => mesiRif.includes(m));
  const mesiAll    = [...new Set([...mesiPeriodo, ...mesiRif])].sort((a,b) => a-b);
  const mesiShow   = mesiPeriodo.length > 0 ? mesiPeriodo : mesiAll;

  const table = document.getElementById(tableId);
  if (!table) return;

  // Intestazioni
  let thead = "<thead><tr>";
  thead += `<th class="kpi-col">KPI</th>`;
  thead += `<th class="unit-col">Unità</th>`;
  mesiShow.forEach(m => { thead += `<th>${MESI_LABEL[m-1]}</th>`; });
  thead += `<th class="total-col">Totale</th>`;
  thead += "</tr></thead>";

  // Righe
  let tbody = "<tbody>";
  for (const kpi of kpis) {
    tbody += "<tr>";
    tbody += `<td class="kpi-col">${kpi.label}</td>`;
    tbody += `<td class="unit-col">${kpi.unit}</td>`;

    for (const m of mesiShow) {
      const vP = kpiValue(aggPeriodo, m, kpi);
      const vR = kpiValue(aggRif, m, kpi);
      let cell = formatVal(vP, kpi.dec);
      cell += formatDelta(vP, vR, kpi);
      tbody += `<td>${cell}</td>`;
    }

    // Totale colonna
    const totP = kpiTotal(aggPeriodo, mesiComuni, kpi);
    const totR = kpiTotal(aggRif, mesiComuni, kpi);
    let totCell = formatVal(totP, kpi.dec);
    totCell += formatDelta(totP, totR, kpi);
    tbody += `<td class="total-col">${totCell}</td>`;

    tbody += "</tr>";
  }
  tbody += "</tbody>";

  table.innerHTML = thead + tbody;
}

// ════════════════════════════════════════════════════════════════════════════
// AGGIORNA DASHBOARD
// ════════════════════════════════════════════════════════════════════════════

function update() {
  const periodo = document.getElementById("sel-period").value;
  const riferim = document.getElementById("sel-ref").value;
  const mode    = document.getElementById("sel-mode").value;

  // Filtra per modalità
  const rowsMode = filterByMode(DATA, mode);

  // Filtra per periodo
  const rowsP = filterByYear(rowsMode, periodo);

  // Cutoff giornaliero: ultima data disponibile nel periodo
  const maxDateP = getMaxDate(rowsP);

  // Filtra per riferimento applicando lo stesso cutoff giorno/mese
  let rowsR;
  if (riferim === "MEDIA") {
    rowsR = applyDayCutoff(rowsMode, maxDateP);
  } else {
    rowsR = applyDayCutoff(filterByYear(rowsMode, riferim), maxDateP);
  }

  // Aggrega
  const aggP = aggregateByMonth(rowsP);
  let aggR;
  if (riferim === "MEDIA") {
    const m = buildMediaStorico(rowsR, periodo, mode);
    aggR = m || aggregateByMonth([]);
  } else {
    aggR = aggregateByMonth(rowsR);
  }

  // Mesi con dati
  const mesiP = [...aggP.acc.keys()].sort((a,b)=>a-b);
  const mesiR = [...aggR.acc.keys()].sort((a,b)=>a-b);

  // Infobar
  const mesiLabel = mesiP.map(m => MESI_LABEL[m-1]).join(", ") || "—";
  const periodoLabel = periodo === "TUTTI" ? "Tutti gli anni" : periodo;
  const rifLabel     = riferim === "MEDIA"  ? "Media Storico"  : riferim;
  const cutoffLabel  = maxDateP ? `  |  Cutoff rif.: ${maxDateP.slice(5)}` : "";
  document.getElementById("infobar").textContent =
    `Periodo: ${periodoLabel}  |  Rif: ${rifLabel}  |  Modalità: ${mode}  |  Mesi periodo: ${mesiP.length} (${mesiLabel})${cutoffLabel}`;

  // Render sezioni
  for (const sec of SECTIONS) {
    renderTable(sec.tableId, sec.kpis, aggP, aggR, mesiP, mesiR);
  }
}

// ════════════════════════════════════════════════════════════════════════════
// MAIN
// ════════════════════════════════════════════════════════════════════════════
document.getElementById("btn-update").addEventListener("click", update);
initDropdowns();
// Aggiorna automaticamente al caricamento
update();
</script>
